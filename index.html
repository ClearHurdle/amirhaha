<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amirhaha</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: black;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }

        h1 {
            text-align: center;
            color: hotpink;
            font-size: 5rem;
            margin: 30px 0;
            text-shadow: 0 0 20px hotpink;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .gallery img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border: 4px solid hotpink;
            transition: transform 0.2s;
        }

        .gallery img:hover {
            transform: scale(1.05) rotate(2deg);
        }

        .floating-text {
            position: fixed;
            color: yellow;
            font-size: 2rem;
            font-weight: bold;
            pointer-events: none;
            animation: spin 8s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .spinning-amir {
            position: fixed;
            width: 400px;
            pointer-events: none;
            animation:
                spin 2s linear infinite,
                floatAround 15s linear infinite,
                spin 5s linear infinite,
                floatAround 10s linear infinite;
        }

        @keyframes floatAround {
            0% {
                top: 10%;
                left: -200px;
            }
            25% {
                top: 20%;
                left: 80%;
            }
            50% {
                top: 70%;
                left: 60%;
            }
            75% {
                top: 40%;
                left: 10%;
            }
            100% {
                top: 10%;
                left: -200px;
            }
        }
    </style>
</head>
<body>

    <h1>AMIR GOON CLUB</h1>

    <div class="gallery">
        <img src="IMG/amir1.jpg">
        <img src="IMG/amir2.jpg">
        <img src="IMG/amir3.jpg">
        <img src="IMG/amir4.jpg">
        <img src="IMG/amir5.jpg">
    </div>

    <div class="floating-text" style="top:10%;left:5%;">
        HAHA AMIR
    </div>

    <div class="floating-text" style="top:70%;left:80%;">
        AMIR #1 GOONER
    </div>

    <img src="IMG/amirspin.jpg" class="spinning-amir" alt="Spinning Amir">

    <audio autoplay loop>
        <source src="IMG/amirstheme.mp3" type="audio/mpeg">
    </audio>

</body>
</html>
